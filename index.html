<!DOCTYPE html>
<html lang="id" style="height: 100%; margin: 0; padding: 0;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examsmangi PC Portal v22</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        html, body, #app { height: 100% !important; width: 100% !important; margin: 0 !important; padding: 0 !important; overflow: hidden; background: #f0f7ff; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #f0f7ff 100%); }
        .bright-card { background: #ffffff; border-radius: 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .section-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        #ujian-section { display: none; flex-direction: column; height: 100%; width: 100%; background: white; }
        #iframe-container { flex: 1; position: relative; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
        .timer-badge { background: #1e3a8a; color: white; padding: 10px 24px; border-radius: 14px; font-weight: 800; font-family: monospace; font-size: 18px; }
        .token-input { background: #f8fafc; border: 3px solid #e2e8f0; color: #1e293b; transition: all 0.3s ease; }
        .token-input:focus { border-color: #3b82f6; background: #ffffff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .banner-slide { transform: translateY(-130%); transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0; }
    </style>
</head>
<body>
    <div id="app">
        <!-- LOADING -->
        <div id="loading-init" class="section-container">
            <div class="text-center">
                <div class="animate-spin h-12 w-12 border-4 border-blue-600 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-blue-600 font-bold tracking-widest uppercase text-xs">Menyiapkan Sistem...</p>
            </div>
        </div>

        <!-- TOKEN SCREEN -->
        <div id="token-section" class="section-container" style="display: none;">
            <div class="bright-card p-10 max-w-lg w-full mx-4 text-center border-t-8 border-blue-600">
                <div class="mb-8">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-200">
                        <i class="fas fa-graduation-cap text-2xl text-white"></i>
                    </div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">EXAMSMANGI <span class="text-blue-600">PC</span></h1>
                    <p class="text-slate-500 mt-1 text-sm font-medium">Ujian Berbasis Komputer & Desktop</p>
                </div>
                <input type="text" id="token-input" placeholder="MASUKKAN TOKEN" 
                       class="token-input w-full rounded-2xl py-5 text-center text-xl md:text-2xl font-black uppercase tracking-widest outline-none mb-6 placeholder:text-sm placeholder:tracking-normal">
                <button onclick="validateToken()" id="btn-masuk" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black text-lg py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all flex items-center justify-center gap-3">
                    <span id="btn-text">MASUK UJIAN</span>
                    <div id="loader" class="hidden animate-spin h-6 w-6 border-4 border-white border-t-transparent rounded-full"></div>
                </button>
                <p id="error-msg" class="text-red-500 mt-4 font-bold text-xs hidden"></p>
            </div>
        </div>

        <!-- MAPEL SCREEN -->
        <div id="mapel-section" class="section-container" style="display: none; overflow-y: auto; align-items: start; padding-top: 5vh;">
            <div class="max-w-4xl w-full p-8">
                <div class="flex justify-between items-center mb-8">
                    <div><h2 class="text-2xl font-black text-slate-800">Daftar Mata Pelajaran</h2><p class="text-slate-500 text-sm">Pilih jadwal ujian hari ini</p></div>
                    <button onclick="clearSession()" class="bg-slate-200 hover:bg-red-500 hover:text-white text-slate-600 px-5 py-2 rounded-xl font-bold text-xs transition-all">LOGOUT</button>
                </div>
                <div id="mapel-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>

        <!-- UJIAN SCREEN -->
        <div id="ujian-section">
            <div id="notif-banner" class="banner-slide fixed top-20 left-0 right-0 p-4 z-[100]">
                <div id="banner-content" class="max-w-2xl mx-auto rounded-3xl p-6 shadow-2xl flex items-center gap-6 text-white border-4 border-white/10">
                    <i class="fas fa-exclamation-circle text-3xl" id="banner-icon"></i>
                    <div>
                        <h5 class="font-black text-lg leading-none mb-1" id="banner-title">PENGUMUMAN</h5>
                        <p class="text-sm font-bold" id="banner-text"></p>
                    </div>
                    <button id="banner-close" onclick="hideBanner()" class="ml-auto text-3xl">&times;</button>
                </div>
            </div>
            <div class="h-[80px] bg-white border-b border-slate-100 px-8 flex justify-between items-center shrink-0 shadow-sm relative z-40">
                <div class="flex items-center gap-5">
                    <button onclick="konfirmasiKeluar()" class="text-slate-300 hover:text-red-500 text-2xl transition-colors"><i class="fas fa-times-circle"></i></button>
                    <div class="border-l pl-5">
                        <h4 id="display-mapel" class="font-black text-slate-800 text-lg leading-none uppercase">MAPEL</h4>
                        <p id="display-info" class="text-[10px] text-blue-600 font-black mt-1 uppercase tracking-widest">INFO</p>
                    </div>
                </div>
                <div id="timer" class="timer-badge">00:00:00</div>
            </div>
            <div id="iframe-container">
                <iframe id="iframe-soal" src="about:blank" allow="geolocation; microphone; camera"></iframe>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQPc8kSn9_ElGLRdNo_fTF38fTYARYKVoDUuU7tLJxIAmEuK9lk1FyH2_6rzVFdJ8l/exec";
        let countdownInterval;
        let iframeLoadCount = 0;

        // --- DETEKSI KIRIM JAWABAN (AUTOMATIC REDIRECT) ---
        document.getElementById('iframe-soal').onload = function() {
            iframeLoadCount++;
            // Iframe load count > 1 biasanya menandakan form telah disubmit/dialihkan ke halaman sukses
            if (iframeLoadCount > 1) {
                setTimeout(() => {
                    if (getSavedSession()) {
                        hideBanner();
                        clearSession(); // Otomatis kembali ke TOKEN
                    }
                }, 3000);
            }
        };

        function saveSession(d) { localStorage.setItem('activeExam', JSON.stringify(d)); window.name = JSON.stringify(d); }
        function getSavedSession() { const s = localStorage.getItem('activeExam') || window.name; try { return s && s.includes("endTime") ? JSON.parse(s) : null; } catch(e) { return null; } }
        
        function initApp() {
            const data = getSavedSession();
            if (data && Math.floor((data.endTime - Date.now()) / 1000) > 0) restoreUjian(data);
            else { hideAll(); document.getElementById('token-section').style.display = 'flex'; document.getElementById('loading-init').style.display = 'none'; }
        }

        async function validateToken() {
            const token = document.getElementById('token-input').value.trim().toUpperCase();
            if (!token) return; toggleLoader(true); const cb = 'jsonp_' + Date.now();
            window[cb] = function(d) {
                delete window[cb]; const s = document.getElementById(cb); if(s) s.remove(); toggleLoader(false);
                if (Array.isArray(d) && d.length > 0) showMapelList(d); else showError("Token salah!");
            };
            const s = document.createElement('script'); s.id = cb; s.src = `${API_URL}?token=${token}&callback=${cb}`;
            s.onerror = () => { toggleLoader(false); showError("Koneksi bermasalah."); };
            document.body.appendChild(s);
        }

        function showMapelList(list) {
            hideAll(); document.getElementById('mapel-section').style.display = 'flex';
            const c = document.getElementById('mapel-container'); c.innerHTML = "";
            list.forEach(m => {
                const card = document.createElement('div'); card.className = "bright-card p-6 cursor-pointer hover:border-blue-500 transition-all group";
                card.innerHTML = `<div class="flex justify-between items-center mb-3"><div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors"><i class="fas fa-file-alt"></i></div><span class="text-[9px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded-full">AKTIF</span></div><h4 class="font-black text-slate-800 text-xl mb-1">${m.Mapel}</h4><p class="text-xs font-bold text-slate-400 uppercase mb-4">${m.Kelas}</p><div class="flex items-center text-blue-600 font-bold text-xs">Mulai Ujian <i class="fas fa-arrow-right ml-1"></i></div>`;
                card.onclick = () => { const d = { url: m["Link Soal"], nama: m.Mapel, kelas: m.Kelas, sesi: m.Sesi, endTime: Date.now() + (parseInt(m.Durasi)*60000) }; saveSession(d); restoreUjian(d); };
                c.appendChild(card);
            });
        }

        function restoreUjian(data) {
            hideAll(); 
            iframeLoadCount = 0; // Reset counter saat ujian baru/muat ulang
            document.getElementById('ujian-section').style.display = 'flex';
            document.getElementById('display-mapel').innerText = data.nama;
            document.getElementById('display-info').innerText = `KELAS ${data.kelas} • SESI ${data.sesi}`;
            let url = data.url; if (url.includes("forms")) url += (url.includes("?")?"&":"?") + "embedded=true";
            document.getElementById('iframe-soal').src = url;
            
            clearInterval(countdownInterval);
            const timerDiv = document.getElementById('timer');
            countdownInterval = setInterval(() => {
                const diff = Math.floor((data.endTime - Date.now()) / 1000);
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    timerDiv.innerText = "HABIS";
                    timerDiv.style.background = "#000";
                    showBanner("WAKTU UJIAN HABIS!", "Segera klik tombol KIRIM di bawah!", "bg-red-600", false);
                } else {
                    if (diff === 600) showBanner("10 MENIT LAGI", "Cek kembali semua jawaban Anda.", "bg-orange-500", true);
                    const h=Math.floor(diff/3600), m=Math.floor((diff%3600)/60), s=diff%60;
                    timerDiv.innerText = `${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                }
            }, 1000);
        }

        function showBanner(t, msg, c, canClose) {
            const b = document.getElementById('notif-banner');
            document.getElementById('banner-content').className = `max-w-2xl mx-auto rounded-3xl p-6 shadow-2xl flex items-center gap-6 text-white ${c}`;
            document.getElementById('banner-title').innerText = t;
            document.getElementById('banner-text').innerText = msg;
            document.getElementById('banner-close').style.display = canClose ? 'block' : 'none';
            b.style.transform = "translateY(0)"; b.style.opacity = "1";
        }

        function hideBanner() { const b = document.getElementById('notif-banner'); b.style.transform = "translateY(-130%)"; b.style.opacity = "0"; }
        function konfirmasiKeluar() { if(confirm("Pastikan Jawaban sudah TERKIRIM. Keluar?")) clearSession(); }
        
        function clearSession() { 
            localStorage.removeItem('activeExam'); 
            window.name=""; 
            // Menggunakan location.replace agar halaman benar-benar segar dan ke tampilan token
            location.replace(window.location.origin + window.location.pathname);
        }

        function hideAll() { ['loading-init', 'token-section', 'mapel-section', 'ujian-section'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; }); }
        function toggleLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); document.getElementById('btn-text').style.display = s ? 'none' : 'block'; }
        function showError(m) { const e = document.getElementById('error-msg'); e.innerText = m; e.classList.remove('hidden'); }
        initApp();
    </script>
</body>
</html>
