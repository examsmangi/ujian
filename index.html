<!DOCTYPE html>
<html lang="id" style="height: 100%; margin: 0; padding: 0;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examsmangi Portal </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* PAKSA TINGGI 100% UNTUK SEMUA PARENT */
        html, body, #app { 
            height: 100% !important; 
            width: 100% !important;
            margin: 0 !important; 
            padding: 0 !important;
            overflow: hidden;
            background: #0f172a; /* Warna dasar gelap */
        }

        body {
            background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%);
            font-family: sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Container Section agar selalu di tengah secara absolut */
        .section-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #ujian-section {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: white;
        }

        #iframe-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .timer-badge {
            background: #ef4444;
            color: white;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-family: monospace;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- 1. LOADING -->
        <div id="loading-init" class="section-container">
            <div class="text-center">
                <div class="animate-spin h-12 w-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-blue-400 font-bold tracking-widest uppercase text-sm">Menyiapkan Sistem...</p>
            </div>
        </div>

        <!-- 2. TOKEN SCREEN (DIJAMIN TENGAH) -->
        <div id="token-section" class="section-container" style="display: none;">
            <div class="glass-card rounded-[2.5rem] p-12 max-w-lg w-full mx-4 text-center">
                <div class="mb-8">
                    <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center mb-4 shadow-xl">
                        <i class="fas fa-shield-alt text-3xl text-white"></i>
                    </div>
                    <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Examsmangi <span class="text-blue-500">PC</span></h1>
                </div>

                <!-- RECOVERY -->
                <div id="recovery-zone" class="hidden mb-6">
                    <button onclick="attemptRestore()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-history"></i> LANJUTKAN UJIAN
                    </button>
                    <div class="text-slate-500 text-[10px] uppercase my-4 font-bold tracking-widest">Atau Masuk Baru</div>
                </div>

                <input type="text" id="token-input" placeholder="TOKEN" 
                       class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-2xl py-5 text-center text-4xl font-black text-blue-400 uppercase focus:border-blue-500 outline-none mb-6">
                
                <button onclick="validateToken()" id="btn-masuk" 
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-xl py-5 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-3">
                    <span id="btn-text">MULAI UJIAN</span>
                    <div id="loader" class="hidden animate-spin h-6 w-6 border-4 border-white border-t-transparent rounded-full"></div>
                </button>
                
                <p id="error-msg" class="text-red-400 mt-6 font-bold text-sm hidden"></p>
            </div>
        </div>

        <!-- 3. MAPEL SCREEN -->
        <div id="mapel-section" class="section-container bg-slate-900" style="display: none; overflow-y: auto;">
            <div class="max-w-4xl w-full p-8">
                <div class="flex justify-between items-center mb-8 bg-white/5 p-6 rounded-3xl border border-white/10">
                    <h2 class="text-2xl font-black text-white">PILIH MATA PELAJARAN</h2>
                    <button onclick="clearSession()" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold text-xs">KELUAR</button>
                </div>
                <div id="mapel-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>

        <!-- 4. UJIAN SCREEN -->
        <div id="ujian-section">
            <div class="h-[75px] bg-slate-100 border-b-2 border-gray-200 px-8 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="konfirmasiKeluar()" class="text-red-500 text-3xl"><i class="fas fa-times-circle"></i></button>
                    <div>
                        <h4 id="display-mapel" class="font-black text-blue-900 text-lg leading-none uppercase">MAPEL</h4>
                        <p id="display-info" class="text-[10px] text-gray-500 font-bold mt-1 uppercase">INFO</p>
                    </div>
                </div>
                <div id="timer" class="timer-badge">00:00:00</div>
            </div>
            <div id="iframe-container">
                <iframe id="iframe-soal" src="about:blank"></iframe>
            </div>
        </div>
    </div>

    <script>
        // PENTING: Gunakan URL APPS SCRIPT JEMBATAN ANDA (berakhiran /exec)
        const API_URL = "https://script.google.com/macros/s/AKfycbxQPc8kSn9_ElGLRdNo_fTF38fTYARYKVoDUuU7tLJxIAmEuK9lk1FyH2_6rzVFdJ8l/exec";
        
        let countdownInterval;

        function saveSession(data) {
            localStorage.setItem('activeExam', JSON.stringify(data));
            window.name = JSON.stringify(data);
        }

        function getSavedSession() {
            const s = localStorage.getItem('activeExam') || window.name;
            try { return s && s.includes("endTime") ? JSON.parse(s) : null; } catch(e) { return null; }
        }

        function initApp() {
            const data = getSavedSession();
            if (data && Math.floor((data.endTime - Date.now()) / 1000) > 0) {
                restoreUjian(data);
            } else {
                hideAll();
                document.getElementById('token-section').style.display = 'flex';
            }
        }

        async function validateToken() {
            const token = document.getElementById('token-input').value.trim().toUpperCase();
            if (!token) return;
            
            toggleLoader(true);
            const callbackName = 'jsonp_' + Date.now();
            
            window[callbackName] = function(data) {
                delete window[callbackName];
                const s = document.getElementById(callbackName);
                if(s) s.remove();
                toggleLoader(false);

                if (Array.isArray(data) && data.length > 0) showMapelList(data);
                else showError("Token tidak valid atau jadwal belum aktif.");
            };

            const script = document.createElement('script');
            script.id = callbackName;
            script.src = `${API_URL}?token=${token}&callback=${callbackName}`;
            script.onerror = () => {
                toggleLoader(false);
                showError("Gagal terhubung! Periksa Whitelist SEB (izinkan script.google.com)");
            };
            document.body.appendChild(script);
        }

        function showMapelList(list) {
            hideAll();
            document.getElementById('mapel-section').style.display = 'flex';
            const container = document.getElementById('mapel-container');
            container.innerHTML = "";
            list.forEach(m => {
                const card = document.createElement('div');
                card.className = "glass-card p-8 rounded-3xl cursor-pointer hover:bg-white hover:text-slate-900 transition-all border-none";
                card.innerHTML = `<h4 class="font-black text-xl mb-1">${m.Mapel}</h4><p class="text-sm opacity-60 font-bold uppercase tracking-widest">Kelas ${m.Kelas} | ${m.Durasi} Menit</p>`;
                card.onclick = () => {
                    const data = { url: m["Link Soal"], nama: m.Mapel, kelas: m.Kelas, sesi: m.Sesi, endTime: Date.now() + (parseInt(m.Durasi)*60000) };
                    saveSession(data);
                    restoreUjian(data);
                };
                container.appendChild(card);
            });
        }

        function restoreUjian(data) {
            hideAll();
            document.getElementById('ujian-section').style.display = 'flex';
            document.getElementById('display-mapel').innerText = data.nama;
            document.getElementById('display-info').innerText = `KELAS ${data.kelas} • SESI ${data.sesi}`;
            let url = data.url;
            if (url.includes("forms")) url += (url.includes("?")?"&":"?") + "embedded=true";
            document.getElementById('iframe-soal').src = url;
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const diff = Math.floor((data.endTime - Date.now()) / 1000);
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('timer').innerText = "HABIS";
                    alert("WAKTU HABIS!");
                } else {
                    const h=Math.floor(diff/3600), m=Math.floor((diff%3600)/60), s=diff%60;
                    document.getElementById('timer').innerText = `${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                }
            }, 1000);
        }

        function konfirmasiKeluar() { if(confirm("Yakin keluar?")) clearSession(); }
        function clearSession() { localStorage.removeItem('activeExam'); window.name=""; location.reload(); }
        function hideAll() { ['loading-init', 'token-section', 'mapel-section', 'ujian-section'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; }); }
        function toggleLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); document.getElementById('btn-text').innerText = s ? "MENGECEK..." : "MULAI UJIAN"; }
        function showError(m) { const e = document.getElementById('error-msg'); e.innerText = m; e.classList.remove('hidden'); }

        initApp();
    </script>
</body>
</html>
