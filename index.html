<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examsmangi Web Portal v1.0.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); }
        body { background: #1e3a8a; font-family: sans-serif; margin: 0; overflow: hidden; }
        .full-screen { height: 100vh; width: 100%; display: flex; flex-direction: column; position: relative; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: white; }
        .timer-badge { background: #ef4444; color: white; padding: 6px 16px; border-radius: 999px; font-weight: bold; font-family: monospace; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .banner-show { transform: translateY(0) !important; opacity: 1 !important; z-index: 100; }
        .app-section { display: none; }
    </style>
</head>
<body>
    <div id="app" class="w-full">
        <div id="loading-init" class="min-h-screen flex items-center justify-center">
            <div class="animate-spin h-10 w-10 border-4 border-white border-t-transparent rounded-full"></div>
        </div>

        <!-- SECTION 1: TOKEN -->
        <div id="token-section" class="app-section min-h-screen flex items-center justify-center p-4">
            <div class="glass rounded-3xl p-8 shadow-2xl text-center max-w-md w-full border-t-8 border-blue-500">
                <h2 class="text-2xl font-black text-blue-900 mb-2">EXAMSMANGI PORTAL</h2>
                <p class="text-gray-500 mb-6 text-sm italic">"Ujian Jujur, Prestasi Luhur"</p>
                <div id="recovery-zone" class="hidden mb-6">
                    <button onclick="attemptRestore()" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 animate-bounce">
                        <i class="fas fa-undo"></i> LANJUTKAN UJIAN TERAKHIR
                    </button>
                    <div class="flex items-center my-4"><hr class="flex-grow border-gray-300"><span class="px-3 text-gray-400 text-xs">ATAU MASUK BARU</span><hr class="flex-grow border-gray-300"></div>
                </div>
                <input type="text" id="token-input" placeholder="MASUKKAN TOKEN" class="w-full text-center py-4 rounded-2xl border-2 mb-4 text-2xl font-mono uppercase focus:border-blue-500 outline-none">
                <button onclick="validateToken()" id="btn-masuk" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
                    <span id="btn-text">CEK JADWAL</span>
                    <div id="loader" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
                </button>
                <p id="error-msg" class="text-red-500 mt-4 hidden font-semibold text-sm"></p>
            </div>
        </div>

        <!-- SECTION 2: MAPEL -->
        <div id="mapel-section" class="app-section min-h-screen p-6">
            <div class="max-w-2xl mx-auto">
                <div class="flex justify-between items-center mb-6 bg-white/10 p-4 rounded-2xl text-white">
                    <h3 class="font-bold">Pilih Mata Pelajaran:</h3>
                    <button onclick="clearSession()" class="bg-red-500 px-3 py-1 rounded-lg text-xs">Keluar</button>
                </div>
                <div id="mapel-container" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>

        <!-- SECTION 3: UJIAN -->
        <div id="ujian-section" class="app-section full-screen bg-white">
            <div id="notif-banner" style="transform: translateY(-120%); transition: all 0.5s ease; opacity: 0;" class="absolute top-16 left-0 right-0 p-4">
                <div id="banner-content" class="max-w-xl mx-auto rounded-2xl p-4 shadow-2xl flex items-center gap-4 text-white">
                    <i class="fas fa-exclamation-triangle"></i>
                    <div><h5 id="banner-title" class="font-bold">PERINGATAN</h5><p id="banner-text" class="text-xs"></p></div>
                    <button id="banner-close" onclick="hideBanner()" class="ml-auto opacity-50"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="bg-slate-100 border-b p-3 flex justify-between items-center shadow-md z-40">
                <div class="flex items-center gap-3">
                    <button onclick="konfirmasiKeluar()" class="text-red-500 text-2xl"><i class="fas fa-times-circle"></i></button>
                    <div class="border-l pl-3">
                        <h4 id="display-mapel" class="font-black text-blue-900 leading-none text-sm uppercase">MAPEL</h4>
                        <p id="display-info" class="text-[10px] text-gray-500 font-bold uppercase">INFO</p>
                    </div>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-gray-400 font-bold">SISA WAKTU</span>
                    <div id="timer" class="timer-badge">00:00:00</div>
                </div>
            </div>
            <iframe id="iframe-soal" src="about:blank" allow="geolocation; microphone; camera"></iframe>
        </div>
    </div>

    <script>
        const SCRIPT_ID = "AKfycbxQPc8kSn9_ElGLRdNo_fTF38fTYARYKVoDUuU7tLJxIAmEuK9lk1FyH2_6rzVFdJ8l";
        const API_URL = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`;
        let countdownInterval;

        function getSavedSession() {
            const storageData = localStorage.getItem('activeExam') || sessionStorage.getItem('activeExam');
            if (storageData) return JSON.parse(storageData);
            if (window.name && window.name.includes("endTime")) return JSON.parse(window.name);
            return null;
        }

        function saveSession(data) {
            const str = JSON.stringify(data);
            localStorage.setItem('activeExam', str);
            sessionStorage.setItem('activeExam', str);
            window.name = str;
        }

        function initApp() {
            const data = getSavedSession();
            if (data) {
                const diff = Math.floor((data.endTime - Date.now()) / 1000);
                if (diff > 0) {
                    restoreUjian(data);
                    setTimeout(() => {
                        if (document.getElementById('ujian-section').style.display !== 'flex') {
                            showTokenScreen(true);
                        }
                    }, 1500);
                    return;
                }
            }
            showTokenScreen(false);
        }

        function showTokenScreen(withRecovery) {
            hideAll();
            document.getElementById('loading-init').style.display = 'none';
            document.getElementById('token-section').style.display = 'flex';
            if (withRecovery) document.getElementById('recovery-zone').classList.remove('hidden');
        }

        function attemptRestore() {
            const data = getSavedSession();
            if (data) restoreUjian(data);
        }

        async function validateToken() {
    const tokenInput = document.getElementById('token-input');
    const token = tokenInput.value.trim().toUpperCase();

    if (!token) return alert("Isi token!");
    
    toggleLoader(true);
    const errorMsg = document.getElementById('error-msg');
    errorMsg.classList.add('hidden');

    // 1. Buat nama fungsi callback unik
    const callbackName = 'jsonp_cb_' + Math.round(100000 * Math.random());
    
    // 2. Siapkan penangan data saat jawaban datang
    window[callbackName] = function(data) {
        delete window[callbackName]; // Bersihkan memori
        document.body.removeChild(script); // Hapus tag skrip sementara
        toggleLoader(false);

        if (Array.isArray(data) && data.length > 0) {
            showMapelList(data);
        } else {
            showError("Token salah atau jadwal tidak ditemukan.");
        }
    };

    // 3. Masukkan tag skrip ke halaman untuk memicu koneksi
    const script = document.createElement('script');
    script.src = `${API_URL}?token=${token}&callback=${callbackName}`;
    script.onerror = function() {
        toggleLoader(false);
        showError("Gagal terhubung ke server (Cek Whitelist SEB).");
    };
    document.body.appendChild(script);
}

        function showMapelList(jadwalList) {
            hideAll();
            document.getElementById('mapel-section').style.display = 'block';
            const container = document.getElementById('mapel-container');
            container.innerHTML = "";
            jadwalList.forEach(mapel => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-lg border-l-8 border-blue-500 cursor-pointer hover:bg-blue-50 mb-4";
                card.innerHTML = `<h4 class="font-bold text-blue-900">${mapel.Mapel}</h4><p class="text-xs text-gray-500">Kelas ${mapel.Kelas} | ${mapel.Durasi} Menit</p>`;
                card.onclick = () => bukaUjian(mapel);
                container.appendChild(card);
            });
        }

        function bukaUjian(mapel) {
            const duration = parseInt(mapel.Durasi) || 0;
            const endTime = Date.now() + (duration * 60 * 1000);
            const examData = {
                url: mapel["Link Soal"],
                nama: mapel.Mapel,
                kelas: mapel.Kelas,
                sesi: mapel.Sesi,
                endTime: endTime
            };
            saveSession(examData);
            restoreUjian(examData);
        }

        function restoreUjian(data) {
            hideAll();
            document.getElementById('loading-init').style.display = 'none';
            document.getElementById('ujian-section').style.display = 'flex';
            document.getElementById('display-mapel').innerText = data.nama;
            document.getElementById('display-info').innerText = `Kelas ${data.kelas} | Sesi ${data.sesi}`;
            let finalUrl = data.url;
            if (finalUrl.includes("forms") && !finalUrl.includes("embedded=true")) {
                finalUrl += (finalUrl.includes("?") ? "&" : "?") + "embedded=true";
            }
            document.getElementById('iframe-soal').src = finalUrl;
            startTimer(data.endTime);
        }

        function startTimer(endTime) {
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const diff = Math.floor((endTime - Date.now()) / 1000);
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('timer').innerText = "HABIS";
                    showBanner("WAKTU HABIS!", "Segera tekan KIRIM!", "bg-red-600", false);
                    return;
                }
                if (diff === 600) showBanner("10 MENIT LAGI", "Periksa kembali jawaban.", "bg-orange-500", true);
                const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
                document.getElementById('timer').innerText = `${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            }, 1000);
        }

        function konfirmasiKeluar() {
            if (confirm("Yakin ingin keluar? Pastikan JAWABAN SUDAH TERKIRIM!")) clearSession();
        }

        function clearSession() {
            localStorage.removeItem('activeExam');
            sessionStorage.removeItem('activeExam');
            window.name = "";
            location.reload();
        }

        function hideAll() {
            ['loading-init', 'token-section', 'mapel-section', 'ujian-section'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.display = 'none';
            });
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('btn-text').innerText = show ? "Mengecek..." : "CEK JADWAL";
        }

        function showError(msg) {
            const err = document.getElementById('error-msg');
            err.innerText = msg; err.classList.remove('hidden');
        }
        
        function showBanner(title, text, color, canClose) {
            const b = document.getElementById('notif-banner');
            document.getElementById('banner-content').className = `max-w-xl mx-auto rounded-2xl p-4 shadow-2xl flex items-center gap-4 text-white ${color}`;
            document.getElementById('banner-title').innerText = title;
            document.getElementById('banner-text').innerText = text;
            document.getElementById('banner-close').style.display = canClose ? 'block' : 'none';
            b.style.transform = "translateY(0)";
            b.style.opacity = "1";
        }

        function hideBanner() { 
            const b = document.getElementById('notif-banner');
            b.style.transform = "translateY(-120%)";
            b.style.opacity = "0";
        }

        initApp();
    </script>
</body>
</html>
