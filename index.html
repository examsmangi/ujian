<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examsmangi Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e3a8a, #1e40af, #111827);
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5);
        }

        /* Logic khusus untuk Iframe agar Full Height */
        #ujian-section { height: 100vh; display: none; flex-direction: column; }
        #iframe-container { flex-grow: 1; width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .timer-glow {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen text-slate-100">

    <div id="app">
        <!-- LOADING INIT -->
        <div id="loading-init" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-[999]">
            <div class="flex flex-col items-center">
                <div class="animate-spin h-12 w-12 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                <p class="font-semibold tracking-widest text-blue-400">MEMUAT SISTEM...</p>
            </div>
        </div>

        <!-- SECTION 1: TOKEN (CENTERED) -->
        <div id="token-section" class="min-h-screen flex items-center justify-center p-6" style="display: none;">
            <div class="glass-card rounded-[2.5rem] p-12 max-w-lg w-full text-center">
                <div class="mb-8">
                    <div class="w-24 h-24 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center mb-4 shadow-2xl shadow-blue-500/20">
                        <i class="fas fa-shield-alt text-4xl text-white"></i>
                    </div>
                    <h1 class="text-4xl font-extrabold tracking-tighter text-white">EXAMS<span class="text-blue-500">MANGI</span></h1>
                    <p class="text-slate-400 mt-2 font-medium">Portal Ujian Aman & Terpercaya</p>
                </div>

                <div id="recovery-zone" class="hidden mb-8">
                    <button onclick="attemptRestore()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-5 rounded-2xl transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-history"></i> LANJUTKAN UJIAN
                    </button>
                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700"></div></div>
                        <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#1a2b5e] px-4 text-slate-500">atau masuk baru</span></div>
                    </div>
                </div>

                <div class="space-y-6">
                    <input type="text" id="token-input" placeholder="KODE TOKEN" 
                           class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-2xl py-5 text-center text-3xl font-black text-blue-400 uppercase tracking-[0.5em] focus:border-blue-500 outline-none transition-all placeholder:text-slate-600">
                    
                    <button onclick="validateToken()" id="btn-masuk" 
                            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-xl py-6 rounded-2xl shadow-xl shadow-blue-600/30 transition-all flex items-center justify-center gap-3 group">
                        <span id="btn-text">MULAI SESI</span>
                        <i class="fas fa-arrow-right transition-transform group-hover:translate-x-2"></i>
                        <div id="loader" class="hidden animate-spin h-6 w-6 border-4 border-white border-t-transparent rounded-full"></div>
                    </button>
                </div>
                <p id="error-msg" class="text-red-400 mt-6 font-bold hidden"></p>
            </div>
        </div>

        <!-- SECTION 2: MAPEL LIST -->
        <div id="mapel-section" class="min-h-screen p-10" style="display: none;">
            <div class="max-w-5xl mx-auto">
                <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                    <div>
                        <h2 class="text-3xl font-extrabold text-white mb-2">Pilih Mata Pelajaran</h2>
                        <p class="text-slate-400">Silakan pilih kartu ujian yang aktif hari ini.</p>
                    </div>
                    <button onclick="clearSession()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white border border-red-500/50 px-8 py-3 rounded-2xl font-bold transition-all">KELUAR SISTEM</button>
                </div>
                <div id="mapel-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>

        <!-- SECTION 3: UJIAN FULLSCREEN -->
        <div id="ujian-section" class="bg-white">
            <!-- Header Header Profesional -->
            <div class="h-[80px] bg-slate-900 border-b border-slate-800 px-8 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-6">
                    <button onclick="konfirmasiKeluar()" class="w-12 h-12 flex items-center justify-center bg-red-500/20 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all">
                        <i class="fas fa-power-off text-xl"></i>
                    </button>
                    <div class="h-10 w-[2px] bg-slate-800 hidden md:block"></div>
                    <div>
                        <h4 id="display-mapel" class="font-black text-white text-xl leading-none uppercase tracking-tight">MAPEL</h4>
                        <p id="display-info" class="text-xs text-blue-500 font-bold uppercase mt-1 tracking-widest">INFO KELAS</p>
                    </div>
                </div>

                <div class="flex items-center gap-10">
                    <div class="text-right hidden sm:block">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Status Jaringan</span>
                        <div class="flex items-center justify-end gap-2 mt-1">
                            <div class="h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div>
                            <span class="text-xs font-bold text-slate-300">ONLINE</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Sisa Waktu</span>
                        <div id="timer" class="timer-badge timer-glow">00:00:00</div>
                    </div>
                </div>
            </div>

            <!-- Banner Notifikasi Floating -->
            <div id="notif-banner" style="transform: translateY(-120%); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0;" class="fixed top-24 left-0 right-0 p-4 z-[999]">
                <div id="banner-content" class="max-w-2xl mx-auto rounded-[2rem] p-6 shadow-2xl flex items-center gap-6 text-white border-4 border-white/10">
                    <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center shrink-0">
                        <i class="fas fa-clock text-3xl" id="banner-icon"></i>
                    </div>
                    <div>
                        <h5 class="font-black text-xl leading-none mb-1" id="banner-title">PENGUMUMAN</h5>
                        <p class="text-sm font-medium opacity-90" id="banner-text"></p>
                    </div>
                    <button id="banner-close" onclick="hideBanner()" class="ml-auto w-10 h-10 flex items-center justify-center hover:bg-white/20 rounded-full text-2xl">&times;</button>
                </div>
            </div>

            <!-- Iframe Container -->
            <div id="iframe-container">
                <iframe id="iframe-soal" src="about:blank" allow="geolocation; microphone; camera"></iframe>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_ID = "AKfycbxQPc8kSn9_ElGLRdNo_fTF38fTYARYKVoDUuU7tLJxIAmEuK9lk1FyH2_6rzVFdJ8l";
        const API_URL = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`;
        let countdownInterval;
        let sisaWaktuDetik = 0;

        function saveSession(data) {
            const str = JSON.stringify(data);
            localStorage.setItem('activeExam', str);
            window.name = str;
        }

        function getSavedSession() {
            const saved = localStorage.getItem('activeExam');
            if (saved) return JSON.parse(saved);
            if (window.name && window.name.includes("endTime")) return JSON.parse(window.name);
            return null;
        }

        function initApp() {
            const data = getSavedSession();
            if (data) {
                const diff = Math.floor((data.endTime - Date.now()) / 1000);
                if (diff > 0) {
                    restoreUjian(data);
                    return;
                }
            }
            hideAll();
            document.getElementById('loading-init').style.display = 'none';
            document.getElementById('token-section').style.display = 'flex';
        }

        async function validateToken() {
            const token = document.getElementById('token-input').value.trim().toUpperCase();
            if (!token) { alert("Silakan isi token!"); return; }
            
            toggleLoader(true);
            try {
                const callbackName = 'jsonp_cb_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    const s = document.getElementById(callbackName);
                    if(s) document.body.removeChild(s);
                    toggleLoader(false);

                    if (Array.isArray(data) && data.length > 0) showMapelList(data);
                    else showError("Token salah atau jadwal tidak ditemukan.");
                };

                const script = document.createElement('script');
                script.id = callbackName;
                script.src = `${API_URL}?token=${token}&callback=${callbackName}`;
                script.onerror = () => { toggleLoader(false); showError("Gagal terhubung ke server."); };
                document.body.appendChild(script);
            } catch (err) { toggleLoader(false); showError("Koneksi bermasalah."); }
        }

        function showMapelList(list) {
            hideAll();
            document.getElementById('mapel-section').style.display = 'block';
            const container = document.getElementById('mapel-container');
            container.innerHTML = "";
            
            list.forEach(m => {
                const card = document.createElement('div');
                card.className = "glass-card p-8 rounded-[2.5rem] cursor-pointer hover:bg-white hover:text-slate-900 transition-all group border-none";
                card.innerHTML = `
                    <div class="flex flex-col h-full">
                        <div class="mb-6 flex justify-between items-start">
                            <div class="w-14 h-14 bg-blue-600/20 group-hover:bg-blue-600 text-blue-500 group-hover:text-white rounded-2xl flex items-center justify-center transition-all">
                                <i class="fas fa-file-alt text-2xl"></i>
                            </div>
                            <span class="bg-blue-600/10 text-blue-400 group-hover:bg-blue-600 group-hover:text-white text-[10px] font-black px-3 py-1 rounded-full transition-all tracking-tighter">AKTIF</span>
                        </div>
                        <h4 class="font-black text-2xl mb-1">${m.Mapel}</h4>
                        <p class="text-slate-400 group-hover:text-slate-600 font-semibold text-sm mb-6 uppercase tracking-wider">Kelas ${m.Kelas} • Sesi ${m.Sesi}</p>
                        <div class="mt-auto pt-6 border-t border-slate-700 group-hover:border-slate-200 flex items-center justify-between">
                            <span class="text-xs font-bold"><i class="far fa-clock mr-1"></i> ${m.Durasi} Menit</span>
                            <i class="fas fa-arrow-right translate-x-[-10px] opacity-0 group-hover:translate-x-0 group-hover:opacity-100 transition-all"></i>
                        </div>
                    </div>
                `;
                card.onclick = () => bukaUjian(m);
                container.appendChild(card);
            });
        }

        function bukaUjian(m) {
            const end = Date.now() + (parseInt(m.Durasi) * 60 * 1000);
            const data = { url: m["Link Soal"], nama: m.Mapel, kelas: m.Kelas, sesi: m.Sesi, endTime: end };
            saveSession(data);
            restoreUjian(data);
        }

        function restoreUjian(data) {
            hideAll();
            document.getElementById('ujian-section').style.display = 'flex';
            document.getElementById('display-mapel').innerText = data.nama;
            document.getElementById('display-info').innerText = `KELAS ${data.kelas} • SESI ${data.sesi}`;
            
            let url = data.url;
            if (url.includes("forms") && !url.includes("embedded=true")) url += (url.includes("?")?"&":"?") + "embedded=true";
            document.getElementById('iframe-soal').src = url;
            startTimer(data.endTime);
        }

        function startTimer(endTime) {
            clearInterval(countdownInterval);
            const display = document.getElementById('timer');
            countdownInterval = setInterval(() => {
                const diff = Math.floor((endTime - Date.now()) / 1000);
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    display.innerText = "HABIS";
                    showBanner("WAKTU HABIS!", "Segera tekan tombol KIRIM di lembar soal!", "bg-red-600", false);
                    return;
                }
                if (diff === 600) showBanner("10 MENIT LAGI", "Waktu hampir habis, segera periksa jawaban.", "bg-orange-500", true);
                
                const h=Math.floor(diff/3600), m=Math.floor((diff%3600)/60), s=diff%60;
                display.innerText = `${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            }, 1000);
        }

        function konfirmasiKeluar() {
            if (confirm("Pastikan Jawaban sudah TERKIRIM. Ingin keluar sistem?")) clearSession();
        }

        function clearSession() {
            localStorage.removeItem('activeExam');
            window.name = "";
            location.reload();
        }

        function hideAll() {
            ['loading-init', 'token-section', 'mapel-section', 'ujian-section'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.display = 'none';
            });
        }

        function toggleLoader(s) {
            document.getElementById('loader').classList.toggle('hidden', !s);
            document.getElementById('btn-text').style.display = s ? 'none' : 'block';
        }

        function showError(m) {
            const e = document.getElementById('error-msg');
            e.innerText = m; e.classList.remove('hidden');
        }

        function showBanner(t, msg, c, can) {
            const b = document.getElementById('notif-banner');
            document.getElementById('banner-content').className = `max-w-2xl mx-auto rounded-[2.5rem] p-8 shadow-2xl flex items-center gap-6 text-white ${c}`;
            document.getElementById('banner-title').innerText = t;
            document.getElementById('banner-text').innerText = msg;
            document.getElementById('banner-close').style.display = can ? 'block' : 'none';
            b.style.transform = "translateY(0)"; b.style.opacity = "1";
        }

        function hideBanner() {
            const b = document.getElementById('notif-banner');
            b.style.transform = "translateY(-120%)"; b.style.opacity = "0";
        }

        initApp();
    </script>
</body>
</html>
